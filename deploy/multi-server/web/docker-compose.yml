services:
  netka-kiosk-web:
    image: netkaofficialhub/netka-kiosk-web-maersk:${IMAGE_TAG:-latest}
    container_name: Kiosk.Maersk.Web
    restart: always
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - TZ=Asia/Bangkok
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
