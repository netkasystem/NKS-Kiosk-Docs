# =============================================================
# Netka Kiosk — nginx File Server
# รับ PUT /api/files/...  → เก็บไฟล์ (จาก web server)
# เสิร์ฟ GET /uploads/... → ส่งไฟล์ (ผ่าน LB หรือตรง)
#
# path ที่ Kiosk ใช้:
#   PUT  /api/files/kiosk/photo/{year}/{month}/{file}.jpg
#   PUT  /api/files/kiosk/face/{year}/{month}/{file}.jpg
#   GET  /uploads/kiosk/photo/{year}/{month}/{file}.jpg
#   GET  /uploads/kiosk/face/{year}/{month}/{file}.jpg
# =============================================================
server {
    listen 80;
    client_max_body_size 50m; # รูปบัตร + face capture ปกติ < 5MB

    # GET — เสิร์ฟรูป (ใครก็อ่านได้ผ่าน LB)
    location /uploads/ {
        root /usr/share/nginx/html;
    }

    # PUT/DELETE — รับ upload จาก web server เท่านั้น
    location /api/files/ {
        dav_methods PUT DELETE MKCOL;
        create_full_put_path on;
        dav_access user:rw group:r all:r;
        alias /usr/share/nginx/html/uploads/;

        # *** แก้เป็น IP/subnet ของ web server จริง ***
        allow 10.1.8.0/24; # *** แก้เป็น subnet ของ web server ***
        allow 10.1.12.0/24; # *** แก้เป็น subnet ของ dev ***
        deny all;
    }
}
