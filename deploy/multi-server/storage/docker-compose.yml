# =============================================================
# เครื่อง Storage — Redis + File Server สำหรับ Kiosk
#
# =============================================================

services:
  redis:
    image: redis:7-alpine
    container_name: Netka.Kiosk.Redis
    restart: always
    ports:
      - "6380:6379"   # ใช้ 6380 เพื่อไม่ชน NSDX.Redis (6379)
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  file-server:
    image: nginx:alpine
    container_name: Netka.Kiosk.FileServer
    restart: always
    entrypoint: ["/bin/sh", "-c", "chmod -R 777 /usr/share/nginx/html/uploads && nginx -g 'daemon off;'"]
    ports:
      - "8082:80"   # ใช้ 8082 เพื่อไม่ชน NSDX.FileServer (8080)
    volumes:
      - ./uploads:/usr/share/nginx/html/uploads
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:
