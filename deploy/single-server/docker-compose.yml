# =============================================================
# Netka Kiosk Web — Single Server
# ต้องเริ่ม Redis ก่อน: docker compose -f docker-compose-redis.yml up -d
# แล้วค่อย:           docker compose up -d
# =============================================================

version: "3.3"

services:
  netka-kiosk-web:
    image: netkaofficialhub/nthaismartweb:${IMAGE_TAG:-latest}
    container_name: Netka.Kiosk.Web
    restart: always
    ports:
      - "5201:8080"
    env_file: .env
    environment:
      - TZ=Asia/Bangkok
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - netka-kiosk-shared

networks:
  netka-kiosk-shared:
    external: true
    name: netka-kiosk-shared
