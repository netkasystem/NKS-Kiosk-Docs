name: Deploy Docs to Public Repo

on:
  push:
    branches: [main, maersk]
    paths:
      - 'docs/**'

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4

      - name: Push docs to public repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DOCS_DEPLOY_TOKEN }}
          external_repository: netkasystem/NKS-Kiosk-Docs
          publish_branch: main
          publish_dir: ./docs
          keep_files: false
          commit_message: "sync docs from NKS-Kiosk-Web"
